name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit suite (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install mcp-guard (with cisco extras)
        run: |
          python -m pip install --upgrade pip
          # cisco extra is heavy and platform-specific; install best-effort.
          pip install -e ./guard[cisco] || pip install -e ./guard

      - name: Run unit suite
        env:
          PYTHONPATH: guard:.
        run: |
          python -m unittest \
            guard.tests.test_discovery \
            guard.tests.test_scanner \
            guard.tests.test_cli \
            guard.tests.test_cisco_bridge \
            runner.tests.test_reporting \
            runner.tests.test_ox_live

      - name: Lint shell + compose
        run: |
          bash -n runner/run-scans.sh
          docker compose config --quiet

  integration:
    name: Endpoint integration (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mcp-guard
        run: |
          python -m pip install --upgrade pip
          pip install -e ./guard

      - name: Run endpoint integration suite
        env:
          PYTHONPATH: guard:.
        run: python -m unittest guard.tests.test_endpoint_integration
