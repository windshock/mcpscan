name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required for manual runs."
        required: true

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/mcp-guard

jobs:
  build:
    name: Build wheel + sdist + image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build guard/

      - name: Smoke install + run
        run: |
          python -m venv /tmp/v
          /tmp/v/bin/pip install guard/dist/*.whl
          /tmp/v/bin/mcp-guard --help

      - name: Upload artifacts (for the docker job)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: guard/dist/

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            guard/dist/*.whl
            guard/dist/*.tar.gz
          generate_release_notes: true

  image:
    name: Build + push GHCR image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ref="${GITHUB_REF#refs/tags/}"
          else
            ref="${{ github.event.inputs.tag }}"
          fi
          echo "value=${ref}" >> "$GITHUB_OUTPUT"
          # Strip leading "v" for image tag (v0.1.0 → 0.1.0)
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: guard/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dist
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            WHEEL=mcp_guard-${{ steps.tag.outputs.version }}-py3-none-any.whl
