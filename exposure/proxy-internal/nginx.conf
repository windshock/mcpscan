events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        # Internal MCP endpoint - requires Bearer auth, strict CORS
        location /mcp {
            proxy_pass http://normal-strict:8000/sse;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;

            # Require Bearer token
            if ($http_authorization !~* "^Bearer ") {
                return 401;
            }

            # CORS: Same origin only
            add_header Access-Control-Allow-Origin "http://localhost:8081" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location /messages {
            proxy_pass http://normal-strict:8000/messages;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;

            if ($http_authorization !~* "^Bearer ") {
                return 401;
            }
        }

        location /health {
            proxy_pass http://normal-strict:8000/;
            proxy_http_version 1.1;
        }
    }
}
